<div id="content" style="padding: 20px; font-family: 'Plus Jakarta Sans', sans-serif; position: relative; min-height: 100vh;">

    <div style="background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 24px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.4); max-width: 1200px; margin: auto;">

        <style>
            /* Reset Margin Body */
            body { margin: 0; background-color: #0f172a; }

            /* Judul Dashboard */
            .dashboard-title {
                text-align: center; 
                font-size: 1.8rem; 
                font-weight: 800;
                color: #fff; 
                margin-bottom: 30px; 
                text-transform: uppercase; 
                letter-spacing: 2px;
                text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            }

            /* Kartu Konten (Putih Bersih agar kontras dengan wadah gelap) */
            #content .glass-card { 
                background: rgba(255, 255, 255, 0.98); 
                border-radius: 1.2rem; 
                border: none; 
                box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); 
            }

            /* Input Filter */
            #content .filter-input { 
                background-color: #ffffff; 
                border: 1px solid #cbd5e1; 
                border-radius: 0.6rem; 
                padding: 0.6rem 1rem; 
                font-size: 0.75rem; 
                font-weight: 600; 
                color: #1e293b; 
                width: 100%; 
                box-sizing: border-box;
                outline: none;
            }

            /* Label Filter (Putih Terang) */
            .filter-group label {
                color: #f1f5f9 !important;
                font-size: 9px;
                font-weight: 800;
                margin-bottom: 6px;
                display: block;
                text-transform: uppercase;
            }

            #content .stat-card-custom { display: flex; flex-direction: column; align-items: center; text-align: center; }
            #content .stat-val { font-size: 3.5rem; font-weight: 800; color: #1e293b; line-height: 1; display: block; margin: 10px 0; }
            .filter-group { display: flex; flex-direction: column; flex: 1; min-width: 140px; }
        </style>

        <h1 class="dashboard-title">DASHBOARD AUDIT 5R</h1>

        <div class="glass-card" style="padding: 20px; margin-bottom: 32px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px;">
            <div class="filter-group">
                <label>GROUP</label>
                <input list="l-group" id="f-group" class="filter-input" placeholder="Cari Group..." oninput="applyFilters()">
                <datalist id="l-group"></datalist>
            </div>
            <div class="filter-group">
                <label>LOKASI</label>
                <input list="l-lokasi" id="f-lokasi" class="filter-input" placeholder="Cari Lokasi..." oninput="applyFilters()">
                <datalist id="l-lokasi"></datalist>
            </div>
            <div class="filter-group">
                <label>AUDITOR</label>
                <input list="l-auditor" id="f-auditor" class="filter-input" placeholder="Cari Auditor..." oninput="applyFilters()">
                <datalist id="l-auditor"></datalist>
            </div>
            <div class="filter-group">
                <label>BULAN</label>
                <input list="l-bulan" id="f-bulan" class="filter-input" placeholder="Cari Bulan..." oninput="applyFilters()">
                <datalist id="l-bulan"></datalist>
            </div>
            <div class="filter-group" style="max-width: 100px;">
                <label>TAHUN</label>
                <input list="l-tahun" id="f-tahun" class="filter-input" placeholder="Tahun" oninput="applyFilters()">
                <datalist id="l-tahun"></datalist>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 32px;">
            <div class="glass-card stat-card-custom" style="padding: 25px; border-left: 8px solid #f59e0b;">
                <p style="font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 0;">Avg 5R Score</p>
                <span id="stat-5r" class="stat-val">0</span>
                <span style="font-size: 10px; font-weight: 800; color: #b45309; background: #fef3c7; padding: 4px 12px; border-radius: 20px;">Target 95</span>
            </div>
            <div class="glass-card stat-card-custom" style="padding: 25px; border-left: 8px solid #ef4444;">
                <p style="font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 0;">Safety Score (S1)</p>
                <span id="stat-s1" class="stat-val">0</span>
            </div>
            <div class="glass-card stat-card-custom" style="padding: 25px; border-left: 8px solid #3b82f6;">
                <p style="font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 0;">Energy Score (S2)</p>
                <span id="stat-s2" class="stat-val">0</span>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; margin-bottom: 32px;">
            <div class="glass-card" style="padding: 24px;">
                <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 12px; margin-bottom: 16px;">Trend Skor 5R Bulanan</h3>
                <div style="height: 300px;"><canvas id="chartTrend"></canvas></div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 12px; margin-bottom: 16px;">Summary Nilai R1 - R5</h3>
                <div style="height: 300px;"><canvas id="chartRSummary"></canvas></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;">
            <div class="glass-card" style="padding: 24px;">
                <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 10px; margin-bottom: 16px;">5R Score vs Target</h3>
                <div style="height: 250px;"><canvas id="chart5R"></canvas></div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 10px; margin-bottom: 16px;">Safety Performance (S1)</h3>
                <div style="height: 250px;"><canvas id="chartSafety"></canvas></div>
            </div>
            <div class="glass-card" style="padding: 24px;">
                <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 10px; margin-bottom: 16px;">Energy Saving (S2)</h3>
                <div style="height: 250px;"><canvas id="chartEnergy"></canvas></div>
            </div>
        </div>

    </div> <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        (function() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT88wHMtZWXtIH3qMCZkLm8S7gDYV6n42v8AHrF6YRpoIMsixdG4EfTiUKe2ERQ7HuAShHSW_mvTg4T/pub?output=csv';
            let rawData = [], colMap = {}, charts = {};
            const monthOrder = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];

            const chartLabelsPlugin = {
                id: 'chartLabelsPlugin',
                afterDatasetsDraw(chart) {
                    const { ctx, data } = chart;
                    ctx.save();
                    ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
                    ctx.font = 'bold 10px sans-serif'; ctx.fillStyle = '#475569';
                    data.datasets.forEach((dataset, i) => {
                        const meta = chart.getDatasetMeta(i);
                        if (dataset.label === 'TARGET') return;
                        meta.data.forEach((element, index) => {
                            const dataVal = dataset.data[index];
                            if (dataVal !== 0 && dataVal !== null) { ctx.fillText(dataVal, element.x, element.y - 5); }
                        });
                    });
                    ctx.restore();
                }
            };

            Papa.parse(csvUrl, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    const headers = results.meta.fields;
                    const find = (keys) => headers.find(h => keys.some(k => h.trim().toUpperCase() === k.toUpperCase()));
                    colMap = {
                        group: find(['GROUP']), lokasi: find(['LOKASI', 'AREA']), auditor: find(['AUDITOR']),
                        bulan: find(['BULAN']), tahun: find(['YEAR', 'TAHUN']), score5r: find(['5R']),
                        s1: find(['S1']), s2: find(['S2']), r1: find(['R1']), r2: find(['R2']), r3: find(['R3']), r4: find(['R4']), r5: find(['R5'])
                    };
                    rawData = results.data.filter(d => d[colMap.group]);
                    const currentYear = new Date().getFullYear().toString();
                    document.getElementById('f-tahun').value = currentYear;
                    applyFilters();
                }
            });

            window.applyFilters = function() {
                const fG = document.getElementById('f-group').value;
                const fL = document.getElementById('f-lokasi').value;
                const fA = document.getElementById('f-auditor').value;
                const fB = document.getElementById('f-bulan').value;
                const fT = document.getElementById('f-tahun').value;

                const filtered = rawData.filter(d => 
                    (!fG || fG === 'SEMUA' || d[colMap.group]?.trim() === fG) && 
                    (!fL || fL === 'SEMUA' || d[colMap.lokasi]?.trim() === fL) && 
                    (!fA || fA === 'SEMUA' || d[colMap.auditor]?.trim() === fA) && 
                    (!fB || fB === 'SEMUA' || d[colMap.bulan]?.trim() === fB) && 
                    (!fT || fT === 'SEMUA' || d[colMap.tahun]?.trim() === fT)
                );
                updateAllDatalists(filtered);
                updateDashboard(filtered);
            };

            function updateAllDatalists(filteredData) {
                const fill = (listId, key, sortArr = null) => {
                    const dl = document.getElementById(listId);
                    let vals = [...new Set(filteredData.map(d => d[key]?.trim()))].filter(v => v);
                    if (sortArr) vals.sort((a, b) => sortArr.indexOf(a.toUpperCase()) - sortArr.indexOf(b.toUpperCase()));
                    else vals.sort();
                    dl.innerHTML = '<option value="SEMUA">';
                    vals.forEach(v => dl.innerHTML += `<option value="${v}">`);
                };
                fill('l-group', colMap.group); fill('l-lokasi', colMap.lokasi);
                fill('l-auditor', colMap.auditor); fill('l-bulan', colMap.bulan, monthOrder);
                fill('l-tahun', colMap.tahun);
            }

            function updateDashboard(data) {
                const uniqueGroups = [...new Set(data.map(d => d[colMap.group]?.trim()))].filter(v => v).sort();
                const uniqueMonths = [...new Set(data.map(d => d[colMap.bulan]?.trim()))].filter(v => v)
                    .sort((a, b) => monthOrder.indexOf(a.toUpperCase()) - monthOrder.indexOf(b.toUpperCase()));

                const getAvg = (filterVal, filterKey, targetKey) => {
                    const subset = filterVal ? data.filter(d => d[filterKey]?.trim() === filterVal) : data;
                    if (subset.length === 0) return 0;
                    const total = subset.reduce((s, r) => s + (parseFloat(r[targetKey]) || 0), 0);
                    return (total / subset.length).toFixed(1);
                };

                const data5R = uniqueGroups.map(g => Math.round(getAvg(g, colMap.group, colMap.score5r)));
                const dataS1 = uniqueGroups.map(g => Math.round(getAvg(g, colMap.group, colMap.s1)));
                const dataS2 = uniqueGroups.map(g => Math.round(getAvg(g, colMap.group, colMap.s2)));
                const trendActual = uniqueMonths.map(m => Math.round(getAvg(m, colMap.bulan, colMap.score5r)));
                const rData = [getAvg(null, null, colMap.r1), getAvg(null, null, colMap.r2), getAvg(null, null, colMap.r3), getAvg(null, null, colMap.r4), getAvg(null, null, colMap.r5)];

                const calcTotalAvg = (dataset) => dataset.length ? Math.round(dataset.reduce((a,b)=>parseFloat(a)+parseFloat(b),0)/dataset.length) : 0;
                document.getElementById('stat-5r').innerText = calcTotalAvg(data5R);
                document.getElementById('stat-s1').innerText = calcTotalAvg(dataS1);
                document.getElementById('stat-s2').innerText = calcTotalAvg(dataS2);

                renderChart('chartTrend', uniqueMonths, [
                    { label: 'SCORE', data: trendActual, type: 'line', borderColor: '#10b981', backgroundColor: '#10b981', borderWidth: 3, pointRadius: 4, tension: 0.3 },
                    { label: 'TARGET', data: uniqueMonths.map(() => 95), type: 'line', borderColor: '#f59e0b', borderDash: [5, 5], borderWidth: 2, pointRadius: 0 }
                ], 'line', 110);

                renderChart('chartRSummary', ['R1', 'R2', 'R3', 'R4', 'R5'], [{ label: 'Avg Score', data: rData, backgroundColor: '#6366f1', borderRadius: 6 }], 'bar', 25);
                renderChart('chart5R', uniqueGroups, [{ label: 'ACTUAL', data: data5R, backgroundColor: '#f59e0b', borderRadius: 4 }, { label: 'TARGET', data: uniqueGroups.map(() => 95), backgroundColor: '#22d3ee', borderRadius: 4 }], 'bar', 110);
                renderChart('chartSafety', uniqueGroups, [{ label: 'S1', data: dataS1, backgroundColor: '#ef4444', borderRadius: 4 }], 'bar', 110);
                renderChart('chartEnergy', uniqueGroups, [{ label: 'S2', data: dataS2, backgroundColor: '#3b82f6', borderRadius: 4 }], 'bar', 110);
            }

            function renderChart(id, labels, datasets, type = 'bar', maxY = 110) {
                const canvas = document.getElementById(id);
                if(!canvas) return;
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(canvas, {
                    type: type, data: { labels, datasets },
                    plugins: [chartLabelsPlugin],
                    options: {
                        maintainAspectRatio: false,
                        layout: { padding: { top: 25 } },
                        plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } },
                        scales: {
                            y: { min: 0, max: maxY, grid: { color: 'rgba(0,0,0,0.05)' }, ticks: { font: { size: 9 } } },
                            x: { grid: { display: false }, ticks: { font: { size: 8, weight: '700' } } }
                        }
                    }
                });
            }
        })();
    </script>
</div>
