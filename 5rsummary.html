<div id="content" style="padding: 40px 20px; max-width: 1200px; margin: auto; position: relative; font-family: 'Plus Jakarta Sans', sans-serif;">
  
  <style>
      #content .glass-card { background: white; border-radius: 1rem; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
      #content .filter-select { background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 600; color: #475569; outline: none; min-width: 120px; }
      #content .stat-val { font-size: 2rem; font-weight: 800; color: #1e293b; line-height: 1; }
  </style>

  <h1 style="position: fixed; top: 0; left: 0; width: 100%; text-align: center; font-size: 1.5rem; color: #fff; background-color: rgba(0, 0, 0, 0.7); z-index: 999; padding: 10px 0; margin: 0; backdrop-filter: blur(3px);">
    DASHBOARD AUDIT 5R
  </h1>

  <div style="height: 60px;"></div>

  <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 32px;">
      <select id="f-group" onchange="applyFilters()" class="filter-select"><option value="">GROUP</option></select>
      <select id="f-lokasi" onchange="applyFilters()" class="filter-select"><option value="">LOKASI</option></select>
      <select id="f-auditor" onchange="applyFilters()" class="filter-select"><option value="">AUDITOR</option></select>
      <select id="f-bulan" onchange="applyFilters()" class="filter-select"><option value="">BULAN</option></select>
      <select id="f-tahun" onchange="applyFilters()" class="filter-select"><option value="">TAHUN</option></select>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 32px;">
      <div class="glass-card" style="padding: 20px; border-left: 8px solid #f59e0b;">
          <p style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px;">Avg 5R Score</p>
          <div style="display: flex; align-items: baseline; gap: 8px;">
              <span id="stat-5r" class="stat-val">0</span>
              <span style="font-size: 10px; font-weight: 800; color: #b45309; background: #fef3c7; padding: 2px 6px; border-radius: 4px;">Target 95</span>
          </div>
      </div>
      <div class="glass-card" style="padding: 20px; border-left: 8px solid #ef4444;">
          <p style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px;">Safety Score (S1)</p>
          <span id="stat-s1" class="stat-val">0</span>
      </div>
      <div class="glass-card" style="padding: 20px; border-left: 8px solid #3b82f6;">
          <p style="font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px;">Energy Score (S2)</p>
          <span id="stat-s2" class="stat-val">0</span>
      </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 24px; margin-bottom: 32px;">
      <div class="glass-card" style="padding: 24px;">
          <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 12px; margin-bottom: 16px;">Trend Skor 5R Bulanan</h3>
          <div style="height: 300px;"><canvas id="chartTrend"></canvas></div>
      </div>
      <div class="glass-card" style="padding: 24px;">
          <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 12px; margin-bottom: 16px;">Summary Nilai R1 - R5</h3>
          <div style="height: 300px;"><canvas id="chartRSummary"></canvas></div>
      </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px;">
      <div class="glass-card" style="padding: 24px;">
          <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 10px; margin-bottom: 16px;">5R Score vs Target</h3>
          <div style="height: 250px;"><canvas id="chart5R"></canvas></div>
      </div>
      <div class="glass-card" style="padding: 24px;">
          <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 10px; margin-bottom: 16px;">Safety Performance (S1)</h3>
          <div style="height: 250px;"><canvas id="chartSafety"></canvas></div>
      </div>
      <div class="glass-card" style="padding: 24px;">
          <h3 style="font-weight: 800; color: #334155; text-transform: uppercase; font-size: 10px; margin-bottom: 16px;">Energy Saving (S2)</h3>
          <div style="height: 250px;"><canvas id="chartEnergy"></canvas></div>
      </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
      let rawData = [], colMap = {}, charts = {};
      const monthOrder = ["JANUARI", "FEBRUARI", "MARET", "APRIL", "MEI", "JUNI", "JULI", "AGUSTUS", "SEPTEMBER", "OKTOBER", "NOVEMBER", "DESEMBER"];

      document.addEventListener("DOMContentLoaded", function() {
          const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT88wHMtZWXtIH3qMCZkLm8S7gDYV6n42v8AHrF6YRpoIMsixdG4EfTiUKe2ERQ7HuAShHSW_mvTg4T/pub?output=csv';
          
          Papa.parse(csvUrl, {
              download: true,
              header: true,
              skipEmptyLines: true,
              complete: function(results) {
                  const headers = results.meta.fields;
                  const find = (keys) => headers.find(h => keys.some(k => h.trim().toUpperCase() === k.toUpperCase()));
                  
                  colMap = {
                      group: find(['GROUP']),
                      lokasi: find(['LOKASI', 'AREA']),
                      auditor: find(['AUDITOR']),
                      bulan: find(['BULAN']),
                      tahun: find(['YEAR', 'TAHUN']),
                      score5r: find(['5R']),
                      s1: find(['S1']),
                      s2: find(['S2']),
                      r1: find(['R1']), r2: find(['R2']), r3: find(['R3']), r4: find(['R4']), r5: find(['R5'])
                  };
                  
                  rawData = results.data.filter(d => d[colMap.group] && d[colMap.group].trim() !== "");
                  populateFilters(rawData);
                  applyFilters();
              }
          });
      });

      function populateFilters(data) {
          const fill = (id, key, label, sortArr = null) => {
              const s = document.getElementById(id);
              if(!s) return;
              let vals = [...new Set(data.map(d => d[key]?.trim()))].filter(v => v);
              if (sortArr) {
                  vals.sort((a, b) => sortArr.indexOf(a.toUpperCase()) - sortArr.indexOf(b.toUpperCase()));
              } else {
                  vals.sort();
              }
              s.innerHTML = `<option value="">SEMUA ${label}</option>`;
              vals.forEach(v => s.innerHTML += `<option value="${v}">${v}</option>`);
          };
          fill('f-group', colMap.group, 'GROUP');
          fill('f-lokasi', colMap.lokasi, 'LOKASI');
          fill('f-auditor', colMap.auditor, 'AUDITOR');
          fill('f-bulan', colMap.bulan, 'BULAN', monthOrder);
          fill('f-tahun', colMap.tahun, 'TAHUN');
      }

      function applyFilters() {
          const fG = document.getElementById('f-group').value;
          const fL = document.getElementById('f-lokasi').value;
          const fA = document.getElementById('f-auditor').value;
          const fB = document.getElementById('f-bulan').value;
          const fT = document.getElementById('f-tahun').value;

          const filtered = rawData.filter(d => 
              (!fG || d[colMap.group]?.trim() === fG) && 
              (!fL || d[colMap.lokasi]?.trim() === fL) && 
              (!fA || d[colMap.auditor]?.trim() === fA) && 
              (!fB || d[colMap.bulan]?.trim() === fB) && 
              (!fT || d[colMap.tahun]?.trim() === fT)
          );
          updateDashboard(filtered);
      }

      function updateDashboard(data) {
          const getAvg = (list, key) => {
              if (list.length === 0) return 0;
              const sum = list.reduce((a, b) => a + (parseFloat(b[key]) || 0), 0);
              return Math.round(sum / list.length);
          };

          // Update Top Cards
          document.getElementById('stat-5r').innerText = getAvg(data, colMap.score5r);
          document.getElementById('stat-s1').innerText = getAvg(data, colMap.s1);
          document.getElementById('stat-s2').innerText = getAvg(data, colMap.s2);

          // Trend Chart
          const monthsInBatch = [...new Set(data.map(d => d[colMap.bulan]?.trim()))]
              .sort((a, b) => monthOrder.indexOf(a.toUpperCase()) - monthOrder.indexOf(b.toUpperCase()));
          const trendData = monthsInBatch.map(m => getAvg(data.filter(d => d[colMap.bulan] === m), colMap.score5r));
          
          renderChart('chartTrend', monthsInBatch, [
              { label: 'SCORE', data: trendData, type: 'line', borderColor: '#10b981', backgroundColor: '#10b981', borderWidth: 3, pointRadius: 5, tension: 0.3 },
              { label: 'TARGET', data: monthsInBatch.map(() => 95), type: 'line', borderColor: '#f59e0b', borderDash: [5, 5], borderWidth: 2, pointRadius: 0 }
          ], 'line');

          // R1-R5 Summary
          const rLabels = ['R1', 'R2', 'R3', 'R4', 'R5'];
          const rValues = [getAvg(data, colMap.r1), getAvg(data, colMap.r2), getAvg(data, colMap.r3), getAvg(data, colMap.r4), getAvg(data, colMap.r5)];
          renderChart('chartRSummary', rLabels, [{ label: 'Avg', data: rValues, backgroundColor: '#6366f1', borderRadius: 6 }]);

          // Group Breakdowns
          const groups = [...new Set(data.map(d => d[colMap.group]?.trim()))].sort();
          const scoreByGroup = groups.map(g => getAvg(data.filter(d => d[colMap.group] === g), colMap.score5r));
          const s1ByGroup = groups.map(g => getAvg(data.filter(d => d[colMap.group] === g), colMap.s1));
          const s2ByGroup = groups.map(g => getAvg(data.filter(d => d[colMap.group] === g), colMap.s2));

          renderChart('chart5R', groups, [
              { label: 'ACTUAL', data: scoreByGroup, backgroundColor: '#f59e0b', borderRadius: 4 },
              { label: 'TARGET', data: groups.map(() => 95), backgroundColor: '#22d3ee', borderRadius: 4 }
          ]);
          renderChart('chartSafety', groups, [{ label: 'S1', data: s1ByGroup, backgroundColor: '#ef4444', borderRadius: 4 }]);
          renderChart('chartEnergy', groups, [{ label: 'S2', data: s2ByGroup, backgroundColor: '#3b82f6', borderRadius: 4 }]);
      }

      function renderChart(id, labels, datasets, type = 'bar') {
          const canvas = document.getElementById(id);
          if(!canvas) return;
          if(charts[id]) charts[id].destroy();

          const labelPlugin = {
              id: 'labelPlugin',
              afterDraw: (chart) => {
                  const { ctx } = chart;
                  ctx.textAlign = 'center';
                  ctx.textBaseline = 'bottom';
                  ctx.font = 'bold 10px sans-serif';
                  ctx.fillStyle = '#1e293b';
                  chart.data.datasets.forEach((dataset, i) => {
                      if (dataset.label === 'TARGET' && type === 'line') return;
                      const meta = chart.getDatasetMeta(i);
                      meta.data.forEach((element, index) => {
                          const val = dataset.data[index];
                          if (val !== null) ctx.fillText(val, element.x, element.y - 8);
                      });
                  });
              }
          };

          charts[id] = new Chart(canvas, {
              type: type,
              data: { labels, datasets },
              options: {
                  maintainAspectRatio: false,
                  layout: { padding: { top: 25 } },
                  plugins: { legend: { display: true, position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } },
                  scales: {
                      y: { beginAtZero: true, max: 125, ticks: { font: { size: 9 } }, grid: { color: '#f1f5f9' } },
                      x: { ticks: { font: { size: 9, weight: '700' } }, grid: { display: false } }
                  }
              },
              plugins: [labelPlugin]
          });
      }
  </script>
</div>
