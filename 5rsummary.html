<div id="content" style="padding: 40px 20px; max-width: 1200px; margin: auto; position: relative; font-family: 'Plus Jakarta Sans', sans-serif;">
  
  <style>
      #content .glass-card { background: white; border-radius: 1rem; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
      #content .filter-input { background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 600; color: #475569; outline: none; width: 100%; box-sizing: border-box; }
      #content .stat-val { font-size: 2rem; font-weight: 800; color: #1e293b; line-height: 1; }
      .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
  </style>

  <h2 style="text-align: center; color: white; margin-bottom: 20px;">DASHBOARD SUMMARY 5R</h2>

  <div class="glass-card" style="padding: 20px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
      <div class="filter-group">
          <label style="font-size: 0.7rem; font-weight: bold; color: #64748b;">DEPARTEMEN</label>
          <input list="list-dept" id="filter-dept" class="filter-input" placeholder="Ketik/Pilih Dept..." oninput="applyCascadingFilter('dept')">
          <datalist id="list-dept"></datalist>
      </div>
      <div class="filter-group">
          <label style="font-size: 0.7rem; font-weight: bold; color: #64748b;">AREA</label>
          <input list="list-area" id="filter-area" class="filter-input" placeholder="Ketik/Pilih Area..." oninput="applyCascadingFilter('area')">
          <datalist id="list-area"></datalist>
      </div>
      <div class="filter-group">
          <label style="font-size: 0.7rem; font-weight: bold; color: #64748b;">AUDITOR</label>
          <input list="list-auditor" id="filter-auditor" class="filter-input" placeholder="Ketik/Pilih Auditor..." oninput="applyCascadingFilter('auditor')">
          <datalist id="list-auditor"></datalist>
      </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;">
      <div class="glass-card" style="padding: 15px; text-align: center;">
          <div style="font-size: 0.7rem; color: #64748b; font-weight: 700;">TOTAL AUDIT</div>
          <div id="stat-total" class="stat-val">0</div>
      </div>
      <div class="glass-card" style="padding: 15px; text-align: center;">
          <div style="font-size: 0.7rem; color: #64748b; font-weight: 700;">RATA-RATA SKOR</div>
          <div id="stat-avg" class="stat-val">0%</div>
      </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
      <div class="glass-card" style="padding: 20px; min-height: 350px;">
          <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: #1e293b;">Trend Skor Mingguan</h3>
          <div style="height: 250px;"><canvas id="chartTrend"></canvas></div>
      </div>
      <div class="glass-card" style="padding: 20px; min-height: 350px;">
          <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: #1e293b;">Pencapaian per Kategori (R)</h3>
          <div style="height: 250px;"><canvas id="chartRadar"></canvas></div>
      </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
      (function() {
          let allData = [];
          let charts = {};
          const csvUrl = 'https://docs.google.com/spreadsheets/d/1D9ETydSBD-7XgM-PxK0Q8y4qSHBlt_40obqCe6k5pao/export?format=csv&gid=517769534';

          Papa.parse(csvUrl, {
              download: true,
              header: true,
              complete: function(results) {
                  allData = results.data.filter(d => d.DEPT);
                  // Initial Populate
                  populateAllFilters(allData);
                  processData(allData);
              }
          });

          function populateAllFilters(data) {
              const depts = [...new Set(data.map(d => d.DEPT))].sort();
              const areas = [...new Set(data.map(d => d.AREA))].sort();
              const auditors = [...new Set(data.map(d => d.AUDITOR))].sort();

              updateList('list-dept', depts);
              updateList('list-area', areas);
              updateList('list-auditor', auditors);
          }

          function updateList(id, items) {
              const list = document.getElementById(id);
              list.innerHTML = '<option value="All">';
              items.forEach(item => { if(item) list.innerHTML += `<option value="${item}">`; });
          }

          // LOGIKA CASCADING: Filter yang saling menyusut
          window.applyCascadingFilter = function(trigger) {
              const dVal = document.getElementById('filter-dept').value;
              const aVal = document.getElementById('filter-area').value;
              const auVal = document.getElementById('filter-auditor').value;

              // 1. Ambil data yang sesuai dengan input saat ini
              let filtered = allData.filter(d => {
                  const mDept = (dVal === '' || dVal === 'All' || d.DEPT === dVal);
                  const mArea = (aVal === '' || aVal === 'All' || d.AREA === aVal);
                  const mAuditor = (auVal === '' || auVal === 'All' || d.AUDITOR === auVal);
                  return mDept && mArea && mAuditor;
              });

              // 2. Jika user merubah DEPARTEMEN, maka list AREA harus menyusut
              if(trigger === 'dept') {
                  const availableAreas = [...new Set(filtered.map(d => d.AREA))].sort();
                  updateList('list-area', availableAreas);
                  // Reset input area jika tidak ada di list baru (optional)
              } 
              // Jika user merubah AREA, list DEPT disesuaikan
              else if (trigger === 'area') {
                  const availableDepts = [...new Set(filtered.map(d => d.DEPT))].sort();
                  updateList('list-dept', availableDepts);
              }

              processData(filtered);
          };

          function processData(data) {
              if(!data.length) return;

              // Stats Update
              document.getElementById('stat-total').innerText = data.length;
              const avg = data.reduce((a, b) => a + parseFloat(b.TOTAL || 0), 0) / data.length;
              document.getElementById('stat-avg').innerText = avg.toFixed(1) + '%';

              // Trend Chart
              const weeks = [...new Set(data.map(d => d.MINGGU))].sort();
              const scores = weeks.map(w => {
                  const dW = data.filter(d => d.MINGGU === w);
                  return (dW.reduce((a, b) => a + parseFloat(b.TOTAL || 0), 0) / dW.length).toFixed(1);
              });

              renderChart('chartTrend', weeks, [{
                  label: 'Skor 5R (%)',
                  data: scores,
                  borderColor: '#4f46e5',
                  backgroundColor: 'rgba(79, 70, 229, 0.1)',
                  fill: true,
                  tension: 0.4
              }], 'line');

              // Radar Chart
              const labels = ['RINGKAS', 'RAPI', 'RESIK', 'RAWAT', 'RAJIN'];
              const keys = ['R1', 'R2', 'R3', 'R4', 'R5'];
              const rData = keys.map(k => (data.reduce((a, b) => a + parseFloat(b[k] || 0), 0) / data.length).toFixed(1));

              renderChart('chartRadar', labels, [{
                  label: 'Pencapaian',
                  data: rData,
                  backgroundColor: 'rgba(6, 182, 212, 0.2)',
                  borderColor: '#06b6d4',
                  borderWidth: 2
              }], 'radar');
          }

          function renderChart(id, labels, datasets, type) {
              const ctx = document.getElementById(id);
              if(!ctx) return;
              if(charts[id]) charts[id].destroy();
              charts[id] = new Chart(ctx, {
                  type: type,
                  data: { labels, datasets },
                  options: {
                      maintainAspectRatio: false,
                      scales: type !== 'radar' ? { y: { min: 0, max: 100 } } : {}
                  }
              });
          }
      })();
  </script>
</div>
