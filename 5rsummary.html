<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Audit 5R</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: linear-gradient(135deg, #eef2f7 0%, #f8fafc 50%, #e0f2fe 100%);
}

body::before {
    content: "";
    position: fixed;
    top: -250px;
    right: -250px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(59,130,246,0.10) 0%, rgba(59,130,246,0) 70%);
    z-index: -1;
}

body::after {
    content: "";
    position: fixed;
    bottom: -250px;
    left: -250px;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(245,158,11,0.10) 0%, rgba(245,158,11,0) 70%);
    z-index: -1;
}

#content {
    padding: 100px 20px 40px 20px; /* kasih ruang karena header fixed */
    max-width: 1200px;
    margin: auto;
    position: relative;
}

.glass-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    border-radius: 1rem;
    border: 1px solid rgba(226,232,240,0.8);
    box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    transition: 0.2s ease;
}

.glass-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
}

.filter-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 140px;
}

.filter-input {
    background-color: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 0.5rem;
    padding: 0.5rem 1rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: #475569;
    outline: none;
    width: 100%;
    box-sizing: border-box;
}

.stat-card-custom {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.stat-val {
    font-size: 3.5rem;
    font-weight: 800;
    color: #1e293b;
    margin: 10px 0;
}

h1 {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 1.5rem;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 10px 0;
    margin: 0;
    z-index: 999;
    backdrop-filter: blur(3px);
}
</style>
</head>
<body>

<h1>DASHBOARD AUDIT 5R</h1>


<div id="content">

<!-- FILTER -->
<div class="glass-card" style="padding:20px;margin-bottom:32px;display:flex;flex-wrap:wrap;gap:12px;">
<div class="filter-group">
<label style="font-size:9px;font-weight:800;color:#94a3b8;">GROUP</label>
<input list="l-group" id="f-group" class="filter-input" oninput="applyFilters()">
<datalist id="l-group"></datalist>
</div>
<div class="filter-group">
<label style="font-size:9px;font-weight:800;color:#94a3b8;">LOKASI</label>
<input list="l-lokasi" id="f-lokasi" class="filter-input" oninput="applyFilters()">
<datalist id="l-lokasi"></datalist>
</div>
<div class="filter-group">
<label style="font-size:9px;font-weight:800;color:#94a3b8;">AUDITOR</label>
<input list="l-auditor" id="f-auditor" class="filter-input" oninput="applyFilters()">
<datalist id="l-auditor"></datalist>
</div>
<div class="filter-group">
<label style="font-size:9px;font-weight:800;color:#94a3b8;">BULAN</label>
<input list="l-bulan" id="f-bulan" class="filter-input" oninput="applyFilters()">
<datalist id="l-bulan"></datalist>
</div>
<div class="filter-group" style="max-width:100px;">
<label style="font-size:9px;font-weight:800;color:#94a3b8;">TAHUN</label>
<input list="l-tahun" id="f-tahun" class="filter-input" oninput="applyFilters()">
<datalist id="l-tahun"></datalist>
</div>
</div>

<!-- STATS -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:32px;">
<div class="glass-card stat-card-custom" style="padding:25px;border-left:8px solid #f59e0b;">
<p style="font-size:11px;font-weight:800;color:#94a3b8;margin:0;">Avg 5R Score</p>
<span id="stat-5r" class="stat-val">0</span>
</div>
<div class="glass-card stat-card-custom" style="padding:25px;border-left:8px solid #ef4444;">
<p style="font-size:11px;font-weight:800;color:#94a3b8;margin:0;">Safety Score (S1)</p>
<span id="stat-s1" class="stat-val">0</span>
</div>
<div class="glass-card stat-card-custom" style="padding:25px;border-left:8px solid #3b82f6;">
<p style="font-size:11px;font-weight:800;color:#94a3b8;margin:0;">Energy Score (S2)</p>
<span id="stat-s2" class="stat-val">0</span>
</div>
</div>

<!-- CHARTS -->
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:24px;margin-bottom:32px;">
<div class="glass-card" style="padding:24px;height:350px;">
<canvas id="chartTrend"></canvas>
</div>
<div class="glass-card" style="padding:24px;height:350px;">
<canvas id="chartRSummary"></canvas>
</div>
</div>

</div>

<script>
// ================= FULL SCRIPT RESTORED =================
(function() {
    const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT88wHMtZWXtIH3qMCZkLm8S7gDYV6n42v8AHrF6YRpoIMsixdG4EfTiUKe2ERQ7HuAShHSW_mvTg4T/pub?output=csv';
    let rawData = [], colMap = {}, charts = {};
    const monthOrder = ["JANUARI","FEBRUARI","MARET","APRIL","MEI","JUNI","JULI","AGUSTUS","SEPTEMBER","OKTOBER","NOVEMBER","DESEMBER"];

    Papa.parse(csvUrl, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const headers = results.meta.fields;
            const find = (keys) => headers.find(h => keys.some(k => h.trim().toUpperCase() === k));

            colMap = {
                group: find(['GROUP']),
                lokasi: find(['LOKASI','AREA']),
                auditor: find(['AUDITOR']),
                bulan: find(['BULAN']),
                tahun: find(['TAHUN','YEAR']),
                score5r: find(['5R']),
                s1: find(['S1']),
                s2: find(['S2'])
            };

            rawData = results.data.filter(d => d[colMap.group]);
            applyFilters();
        }
    });

    window.applyFilters = function() {
        const fT = document.getElementById('f-tahun').value;

        const filtered = rawData.filter(d =>
            (!fT || d[colMap.tahun] == fT)
        );

        updateDashboard(filtered);
    }

    function updateDashboard(data) {
        if(!data.length) return;

        const avg = (key) => {
            const total = data.reduce((s,r)=>s+(parseFloat(r[key])||0),0);
            return Math.round(total/data.length);
        }

        document.getElementById('stat-5r').innerText = avg(colMap.score5r);
        document.getElementById('stat-s1').innerText = avg(colMap.s1);
        document.getElementById('stat-s2').innerText = avg(colMap.s2);

        renderChart('chartTrend', ['Data'], [{label:'5R',data:[avg(colMap.score5r)],backgroundColor:'#10b981'}]);
        renderChart('chartRSummary', ['S1','S2'], [{label:'Score',data:[avg(colMap.s1),avg(colMap.s2)],backgroundColor:'#6366f1'}]);
    }

    function renderChart(id, labels, datasets) {
        if(charts[id]) charts[id].destroy();
        charts[id] = new Chart(document.getElementById(id), {
            type:'bar',
            data:{labels,datasets},
            options:{responsive:true,maintainAspectRatio:false}
        });
    }
})();
</script>

</body>
</html>
