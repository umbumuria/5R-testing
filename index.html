<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>5R MSM</title>
  <link rel="icon" href="https://res.cloudinary.com/ddhsrvefu/image/upload/v1745992627/1-removebg-preview_w6oqhr.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://res.cloudinary.com/ddhsrvefu/image/upload/v1744159479/Slidesdocs_dark_black_future_medical_data_9a4be803ba_ywgbec.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e5e7eb;
      transition: margin-left 0.3s ease;
    }
    #content {
      margin-left: 220px;
      padding: 20px;
      transition: margin-left 0.3s ease, opacity 0.3s ease;
      min-height: 100vh;
    }
    .sidebar-hidden #content {
      margin-left: 0;
    }
  </style>
</head>
<body>
  <div id="header"></div>
  <div id="content"></div>
  <div id="footer"></div>

  <script>
    // 1. Load Header & Inisialisasi Navigasi
    fetch('header.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
        
        // Tentukan halaman awal (misal 5rsummary.html atau home.html)
        const current = "home.html"; 
        loadPage(current);
        highlightNav(current);

        // Pasang listener klik pada tombol navigasi
        document.addEventListener('click', function (e) {
          const btn = e.target.closest('.nav-button');
          if (!btn) return;
          
          const page = btn.getAttribute('href');
          if (page && !page.startsWith('http')) {
            e.preventDefault();
            loadPage(page);
            highlightNav(page);
          }
        });

        // Toggle sidebar
        const toggleBtn = document.getElementById('toggleSidebar');
        if (toggleBtn) {
          toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-hidden');
          });
        }
      });

    // 2. Fungsi Load Page dengan Eksekusi Script
    function loadPage(page) {
      const content = document.getElementById('content');
      content.style.opacity = 0;

      fetch(page)
        .then(res => res.text())
        .then(data => {
          const temp = document.createElement('div');
          temp.innerHTML = data;
          
          // Ambil bagian dalam #content dari file tujuan, jika tidak ada ambil semua data
          const innerHTML = temp.querySelector('#content')?.innerHTML || data;

          setTimeout(() => {
            content.innerHTML = innerHTML;
            content.style.opacity = 1;

            // PENTING: Jalankan ulang semua tag <script> agar dashboard muncul
            const scripts = temp.querySelectorAll('script');
            scripts.forEach(oldScript => {
              const newScript = document.createElement('script');
              if (oldScript.src) {
                newScript.src = oldScript.src; // Untuk library eksternal (Chart.js)
              } else {
                newScript.textContent = oldScript.textContent; // Untuk kode dashboard
              }
              document.body.appendChild(newScript);
            });
          }, 150);
        })
        .catch(err => console.error("Gagal memuat halaman:", err));
    }

    // 3. Highlight Menu Aktif
    function highlightNav(page) {
      document.querySelectorAll('.nav-button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('href') === page);
      });
    }

    // 4. Load Footer
    fetch('footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });
  </script>
</body>
</html>
