<div id="content" style="padding: 40px 20px; max-width: 1200px; margin: auto; position: relative; font-family: 'Plus Jakarta Sans', sans-serif;">
  
  <style>
      #content .glass-card { background: white; border-radius: 1rem; border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); }
      #content .filter-select { background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.75rem; font-weight: 600; color: #475569; outline: none; width: 100%; box-sizing: border-box; }
      #content .stat-val { font-size: 2rem; font-weight: 800; color: #1e293b; line-height: 1; }
      .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 150px; }
  </style>

  <div class="glass-card" style="padding: 20px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; margin-top: 40px;">
      <div class="filter-group">
          <label style="font-size: 0.7rem; font-weight: bold; color: #64748b;">DEPARTEMEN</label>
          <input list="list-dept" id="filter-dept" class="filter-select" placeholder="Ketik/Pilih Dept..." oninput="applyCascadingFilter('dept')">
          <datalist id="list-dept"></datalist>
      </div>
      <div class="filter-group">
          <label style="font-size: 0.7rem; font-weight: bold; color: #64748b;">AREA</label>
          <input list="list-area" id="filter-area" class="filter-select" placeholder="Ketik/Pilih Area..." oninput="applyCascadingFilter('area')">
          <datalist id="list-area"></datalist>
      </div>
      <div class="filter-group">
          <label style="font-size: 0.7rem; font-weight: bold; color: #64748b;">AUDITOR</label>
          <input list="list-auditor" id="filter-auditor" class="filter-select" placeholder="Ketik/Pilih Auditor..." oninput="applyCascadingFilter('auditor')">
          <datalist id="list-auditor"></datalist>
      </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px;">
      <div class="glass-card" style="padding: 15px; text-align: center;">
          <div style="font-size: 0.7rem; color: #64748b; font-weight: 700;">TOTAL AUDIT</div>
          <div id="stat-total" class="stat-val">0</div>
      </div>
      <div class="glass-card" style="padding: 15px; text-align: center;">
          <div style="font-size: 0.7rem; color: #64748b; font-weight: 700;">RATA-RATA SKOR</div>
          <div id="stat-avg" class="stat-val">0%</div>
      </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
      <div class="glass-card" style="padding: 20px; min-height: 300px;">
          <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: #1e293b;">Trend Skor Mingguan</h3>
          <div style="height: 250px;"><canvas id="chartTrend"></canvas></div>
      </div>
      <div class="glass-card" style="padding: 20px; min-height: 300px;">
          <h3 style="font-size: 0.9rem; margin-bottom: 15px; color: #1e293b;">Pencapaian per Kategori (R)</h3>
          <div style="height: 250px;"><canvas id="chartRadar"></canvas></div>
      </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
      (function() {
          let allData = [];
          let charts = {};

          const csvUrl = 'https://docs.google.com/spreadsheets/d/1D9ETydSBD-7XgM-PxK0Q8y4qSHBlt_40obqCe6k5pao/export?format=csv&gid=517769534';

          Papa.parse(csvUrl, {
              download: true,
              header: true,
              complete: function(results) {
                  allData = results.data.filter(d => d.DEPT);
                  // Isi datalist awal
                  updateDatalists(allData);
                  processData(allData);
              }
          });

          // Fungsi untuk update pilihan di dropdown (datalist)
          function updateDatalists(data) {
              const depts = [...new Set(data.map(d => d.DEPT))].sort();
              const areas = [...new Set(data.map(d => d.AREA))].sort();
              const auditors = [...new Set(data.map(d => d.AUDITOR))].sort();

              populate('list-dept', depts);
              populate('list-area', areas);
              populate('list-auditor', auditors);
          }

          function populate(id, items) {
              const el = document.getElementById(id);
              el.innerHTML = '<option value="All">';
              items.forEach(item => { if(item) el.innerHTML += `<option value="${item}">`; });
          }

          // Fungsi Cascading Filter
          window.applyCascadingFilter = function(trigger) {
              const dVal = document.getElementById('filter-dept').value;
              const aVal = document.getElementById('filter-area').value;
              const auVal = document.getElementById('filter-auditor').value;

              // Filter data berdasarkan input
              let filtered = allData.filter(d => {
                  return (dVal === '' || dVal === 'All' || d.DEPT === dVal) &&
                         (aVal === '' || aVal === 'All' || d.AREA === aVal) &&
                         (auVal === '' || auVal === 'All' || d.AUDITOR === auVal);
              });

              // Jika ganti Dept, maka list Area & Auditor menyusut menyesuaikan data yang terfilter
              if(trigger === 'dept') {
                  const subAreas = [...new Set(filtered.map(d => d.AREA))].sort();
                  populate('list-area', subAreas);
              }

              processData(filtered);
          };

          function processData(data) {
              if(data.length === 0) return;

              // Update Statistik
              document.getElementById('stat-total').innerText = data.length;
              const avg = data.reduce((acc, curr) => acc + parseFloat(curr.TOTAL || 0), 0) / data.length;
              document.getElementById('stat-avg').innerText = avg.toFixed(1) + '%';

              // Logika Chart (Trend Mingguan)
              const weeks = [...new Set(data.map(d => d.MINGGU))].sort();
              const weekScores = weeks.map(w => {
                  const dWeek = data.filter(d => d.MINGGU === w);
                  return (dWeek.reduce((a, b) => a + parseFloat(b.TOTAL || 0), 0) / dWeek.length).toFixed(1);
              });

              renderChart('chartTrend', weeks, [{
                  label: 'Skor 5R',
                  data: weekScores,
                  borderColor: '#4f46e5',
                  backgroundColor: 'rgba(79, 70, 229, 0.1)',
                  fill: true,
                  tension: 0.4
              }], 'line');

              // Logika Chart Radar (5R)
              const rKeys = ['R1', 'R2', 'R3', 'R4', 'R5'];
              const rLabels = ['RINGKAS', 'RAPI', 'RESIK', 'RAWAT', 'RAJIN'];
              const rAvg = rKeys.map(k => {
                  return (data.reduce((a, b) => a + parseFloat(b[k] || 0), 0) / data.length).toFixed(1);
              });

              renderChart('chartRadar', rLabels, [{
                  label: 'Pencapaian',
                  data: rAvg,
                  backgroundColor: 'rgba(6, 182, 212, 0.2)',
                  borderColor: '#06b6d4',
                  borderWidth: 2
              }], 'radar');
          }

          function renderChart(id, labels, datasets, type) {
              if(charts[id]) charts[id].destroy();
              charts[id] = new Chart(document.getElementById(id), {
                  type: type,
                  data: { labels, datasets },
                  options: {
                      maintainAspectRatio: false,
                      scales: type !== 'radar' ? {
                          y: { min: 0, max: 100 }
                      } : {}
                  }
              });
          }
      })();
  </script>
</div>
