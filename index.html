<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>5R MSM</title>
  <link rel="icon" href="https://res.cloudinary.com/ddhsrvefu/image/upload/v1745992627/1-removebg-preview_w6oqhr.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://res.cloudinary.com/ddhsrvefu/image/upload/v1744159479/Slidesdocs_dark_black_future_medical_data_9a4be803ba_ywgbec.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #e5e7eb;
      transition: margin-left 0.3s ease;
    }
    #content {
      margin-left: 220px;
      padding: 20px;
      transition: margin-left 0.3s ease, opacity 0.3s ease;
      min-height: 100vh;
    }
    /* Optimasi Mobile */
    @media (max-width: 768px) {
      #content { margin-left: 0; padding: 10px; }
      body:not(.sidebar-hidden) #content { margin-left: 0; }
    }
    .sidebar-hidden #content {
      margin-left: 0;
    }
  </style>
</head>
<body>
  <div id="header"></div>
  <div id="content"></div>
  <div id="footer"></div>

  <script>
    // 1. Load Header & Inisialisasi Navigasi
    fetch('header.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('header').innerHTML = data;
        
        // Halaman awal (Sesuaikan ke 5rsummary.html jika ingin dashboard jadi beranda)
        const current = "home.html"; 
        loadPage(current);
        highlightNav(current);

        // Listener klik navigasi (Event Delegation)
        document.addEventListener('click', function (e) {
          const btn = e.target.closest('.nav-button');
          if (!btn) return;
          
          const page = btn.getAttribute('href');
          if (page && !page.startsWith('http')) {
            e.preventDefault();
            loadPage(page);
            highlightNav(page);
          }
        });

        // Toggle sidebar
        const toggleBtn = document.getElementById('toggleSidebar');
        if (toggleBtn) {
          toggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('sidebar-hidden');
          });
        }
      });

    // 2. Fungsi Load Page (Optimasi Desktop & Mobile)
    function loadPage(page) {
      const content = document.getElementById('content');
      content.style.opacity = 0;

      fetch(page)
        .then(res => res.text())
        .then(data => {
          // Bersihkan script dinamis sebelumnya agar tidak bentrok
          document.querySelectorAll('.dynamic-script').forEach(s => s.remove());

          const temp = document.createElement('div');
          temp.innerHTML = data;
          
          // Ambil elemen #content dari file target, jika tidak ada ambil semua
          const innerHTML = temp.querySelector('#content')?.innerHTML || data;

          setTimeout(() => {
            content.innerHTML = innerHTML;
            content.style.opacity = 1;

            // Pisahkan Library (External) dan Kode Dashboard (Inline)
            const scripts = Array.from(temp.querySelectorAll('script'));
            const externalScripts = scripts.filter(s => s.src);
            const inlineScripts = scripts.filter(s => !s.src);

            // Muat library dulu secara berurutan, setelah selesai baru jalankan kodenya
            loadExternalScripts(externalScripts, () => {
              inlineScripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.textContent = oldScript.textContent;
                newScript.className = 'dynamic-script';
                document.body.appendChild(newScript);
              });
            });
          }, 150);
        })
        .catch(err => {
          console.error("Gagal memuat halaman:", err);
          content.innerHTML = "Error loading content.";
          content.style.opacity = 1;
        });
    }

    // Fungsi bantu muat script external secara berurutan (Sequentially)
    function loadExternalScripts(scripts, callback) {
      if (scripts.length === 0) return callback();
      let loaded = 0;
      scripts.forEach(s => {
        const newScript = document.createElement('script');
        newScript.src = s.src;
        newScript.className = 'dynamic-script';
        newScript.async = false; // Memastikan library dimuat berurutan
        newScript.onload = () => {
          loaded++;
          if (loaded === scripts.length) callback();
        };
        document.body.appendChild(newScript);
      });
    }

    // 3. Highlight Menu Aktif
    function highlightNav(page) {
      document.querySelectorAll('.nav-button').forEach(b => {
        b.classList.toggle('active', b.getAttribute('href') === page);
      });
    }

    // 4. Load Footer
    fetch('footer.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('footer').innerHTML = data;
      });
  </script>
</body>
</html>
